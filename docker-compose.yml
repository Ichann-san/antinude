version: "3.8"

services:
  antinude:
    build: .
    container_name: antinude-api
    ports:
      - "8000:8000"
    environment:
      - ANTINUDE_API_KEY=${ANTINUDE_API_KEY:-}
      - PORT=8000
    env_file:
      - .env  # optional, for local overrides
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
